<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Snap Tool</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel controls">
        <h1>AI Image Pixel Snap</h1>
        <p class="muted">
          로컬 이미지를 올린 뒤 기준점(anchor)과 최소 픽셀 크기를 정해 전체 이미지를 격자에 맞춰 픽셀화합니다.
        </p>

        <label class="field">
          <span>이미지 파일</span>
          <input id="imageInput" type="file" accept="image/*" />
        </label>

        <label class="field">
          <span>최소 픽셀 크기 (px)</span>
          <input id="pixelSize" type="number" min="1" step="1" value="6" />
        </label>

        <div class="field">
          <span>Anchor (기준점)</span>
          <p class="muted small">
            캔버스를 클릭하면 해당 좌표가 anchor가 됩니다. 같은 픽셀 사이즈라도 anchor에 따라 결과가 달라집니다.
          </p>
          <div id="anchorLabel" class="pill">x: -, y: -</div>
        </div>

        <div class="actions">
          <button id="snapButton">Pixel Snap 적용</button>
          <button id="downloadButton" class="secondary" disabled>PNG 다운로드</button>
        </div>

        <p id="status" class="status">이미지를 업로드하세요.</p>
      </section>

      <section class="panel canvas-panel">
        <canvas id="canvas" width="1024" height="1024" aria-label="Pixel snap preview"></canvas>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
